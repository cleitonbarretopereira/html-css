<body>
    <h1>Tags em HTML5</h1>
    <p>Em HTML5, podemos inserir os elemtnos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá utilizar em cada caso</p>

    <ul>
        <li><abbr title="Usar a Tag <p>">Parágrafos</abbr></li>
        <li><abbr title="Usar a Tag <h> de acordo com a ordem dos títulos">Títulos</abbr></li>
        <li><abbr title="Usar a Tag <img>">Imagens</abbr></li>
        <li><abbr title="Usar a Tag <abbr>">Abreviações</abbr></li>
        <li><abbr title="Usar a Tag<code>">Códigos-fonte</abbr></li>
        <li><abbr title="Usar a Tag <ol>">Listas numeradas</abbr></li>
        <li><abbr title="Usar a Tag <ul>">Listas com demarcadores</abbr></li>
    </ul>
