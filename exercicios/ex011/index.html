<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir esses site em vários dispositvos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador.</p>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png">
        <img src="imagens/foto-g.png" alt="Imagem Flexível">
    </picture>

    <h1>Reproduzindo Áudio</h1>
    <p>Vamos aprender à reproduzir áudio em HTML5</p>
    <!--<audio src="midia/hiphop.mp3" controls ></audio>-->
    <audio controls preload="">
        <source src="midia/hiphop.mp3" type="audio/mpeg">
        <source src="midia/hiphop.ogg" type="audio/ogg">
        <source src="midia/hiphop.wav" type="audio/wav">
        <p>Infelizmente seu navegador não conseguiu tocar a música. <a href="midia/hiphop.mp3">Clique aqui para baixar o arquivo</a>
    </p>
    </audio>

    <h1></h1>
</body>
</html>
