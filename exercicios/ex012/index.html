<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com HTML5</title>
</head>
<body>
    <h1>Inserindo vídeos hospedados localmente</h1>
    <p>Este vídeo está hospedado no meu servidor local.</p>
    <!--<video src="midia/meu-video.mp4"width="320"controls ></video>-->
    <video controls autoplay loop poster="imagens/capa.png" width="560">
        <source src="midia/meu-video.mkv" width= type="video/mkv">
        <source src="midia/meu-video.webm" width= type="video/webm">
        <source src="midia/meu-video.mp4" width= type="video/mp4">
        <p>Seu navegador não suporta reprodução de vídeos nesse formato. <a href="midia/meu-video.mp4">Clique aqui</a>para baixar o vídeo.</p>
    </video>

    <h1>Inserindo Vídeos do Youtube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/NVAwlUJ2JXM?si=XdbjD18XXgsBad7Q" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    <h1>Inserindo Vídeos do Vimeo</h1>
    <iframe src="https://player.vimeo.com/video/1096005227?h=43d4661bc2&byline=0&portrait=0" width="560" height="315" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
</body>
</html>
